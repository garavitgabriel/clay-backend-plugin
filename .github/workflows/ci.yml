name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          uv venv
          uv pip install -e ".[local-embeddings,scheduler]"
          uv pip install pytest pytest-asyncio ruff

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Test
        run: EMBEDDING_PROVIDER=local uv run pytest -q
