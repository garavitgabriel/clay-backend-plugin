# Override Nixpacks auto-detection — build the hosted service, not the plugin
[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = ["python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r hosted/requirements.txt"]

[start]
cmd = "cd hosted && uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}"
